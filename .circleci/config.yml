version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Typecheck
          command: npm run typecheck
      - run:
          name: Build
          command: npm run build

workflows:
  ci:
    jobs:
      - build
