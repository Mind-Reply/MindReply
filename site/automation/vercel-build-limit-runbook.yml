runbook: Vercel build-rate-limit
status: active_blocker_when_latest_commit_status_links_to_upgradeToPro
symptom:
  github_status_context: Vercel
  target_url_contains: upgradeToPro=build-rate-limit
  effect: Latest GitHub main may not publish even when code is valid.
known_mitigation_in_repo:
  file: vercel.json
  guard: scripts/vercel-ignore-build.mjs
  purpose: Skip non-canonical preview builds and reduce avoidable Vercel build usage.
checks:
  - confirm latest GitHub commit status
  - open Vercel target URL and verify whether it is quota/rate-limit or code failure
  - if quota clears, verify /agent, /mcp, /api/health, sitemap, robots, manifest, and social preview
  - if quota remains, avoid unnecessary extra deploy-triggering commits unless the change is important
next_actions:
  code_path: Keep reducing duplicate builds and keep monitor artifacts current.
  account_path: Upgrade or reset Vercel build quota from the Vercel account/project dashboard.
  verification_path: After quota clears, capture a fresh production preview and update the personal pack.
report_language: Vercel build quota is the blocker; this is not proven to be a code compile failure unless build logs say so.
