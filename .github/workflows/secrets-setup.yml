name: Setup Secrets & Environment

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *' # Monthly key rotation check

jobs:
  setup-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Required Secrets
        run: |
          REQUIRED_SECRETS=(
            "DATABASE_URL"
            "REDIS_URL"
            "GMAIL_CLIENT_ID"
            "GMAIL_CLIENT_SECRET"
            "OPENAI_API_KEY"
            "ANTHROPIC_API_KEY"
            "STRIPE_SECRET_KEY"
            "JWT_SECRET"
            "N8N_ENCRYPTION_KEY"
          )

          for secret in "${REQUIRED_SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              echo "❌ Missing secret: $secret"
              exit 1
            else
              echo "✅ $secret configured"
            fi
          done

      - name: Validate Secret Format
        run: |
          # Check JWT_SECRET length (min 32 chars)
          if [ ${#JWT_SECRET} -lt 32 ]; then
            echo "❌ JWT_SECRET must be at least 32 characters"
            exit 1
          fi
          echo "✅ JWT_SECRET format valid"

          # Check API keys format
          if [[ ! "$OPENAI_API_KEY" =~ ^sk- ]]; then
            echo "❌ OPENAI_API_KEY format invalid"
            exit 1
          fi
          echo "✅ OPENAI_API_KEY format valid"

      - name: Generate .env Template
        run: |
          cat > .env.template << 'EOF'
          # Database
          DATABASE_URL=postgresql://user:password@localhost:5432/mindreply
          REDIS_URL=redis://localhost:6379

          # Gmail Integration
          GMAIL_CLIENT_ID=your_client_id
          GMAIL_CLIENT_SECRET=your_client_secret
          GMAIL_REDIRECT_URI=http://localhost:3001/api/auth/gmail/callback

          # AI APIs
          OPENAI_API_KEY=sk-your_key_here
          ANTHROPIC_API_KEY=your_anthropic_key
          AI_MODEL=openai

          # Payment
          STRIPE_PUBLIC_KEY=pk_live_xxx
          STRIPE_SECRET_KEY=sk_live_xxx
          STRIPE_WEBHOOK_SECRET=whsec_xxx

          # Security
          JWT_SECRET=your_32_character_minimum_jwt_secret_key
          JWT_EXPIRY=7d

          # n8n
          N8N_ENCRYPTION_KEY=your_n8n_encryption_key
          N8N_HOST=http://localhost:5678

          # Monitoring
          SENTRY_DSN=https://your_sentry_dsn

          # Environment
          NODE_ENV=development
          NEXT_PUBLIC_API_URL=http://localhost:3001
          LOG_LEVEL=info
          EOF

      - name: Create GitHub Actions Secrets Documentation
        run: |
          cat > SECRETS_SETUP.md << 'EOF'
          # GitHub Actions Secrets Setup

          Add the following secrets to your GitHub repository:

          ## Database & Cache
          - `DATABASE_URL`: PostgreSQL connection string
          - `REDIS_URL`: Redis connection URL

          ## Authentication
          - `GMAIL_CLIENT_ID`: OAuth2 client ID from Google Cloud
          - `GMAIL_CLIENT_SECRET`: OAuth2 client secret from Google Cloud

          ## AI Services
          - `OPENAI_API_KEY`: OpenAI API key (starts with `sk-`)
          - `ANTHROPIC_API_KEY`: Anthropic Claude API key

          ## Payment Processing
          - `STRIPE_PUBLIC_KEY`: Stripe publishable key
          - `STRIPE_SECRET_KEY`: Stripe secret key
          - `STRIPE_WEBHOOK_SECRET`: Stripe webhook signing secret

          ## Security
          - `JWT_SECRET`: Random 32+ character secret for JWT signing
          - `N8N_ENCRYPTION_KEY`: Encryption key for n8n

          ## Deployment
          - `DOCKER_USERNAME`: Docker Hub username
          - `DOCKER_PASSWORD`: Docker Hub access token
          - `KUBECONFIG`: Kubernetes config (base64 encoded)

          ## Monitoring
          - `SENTRY_DSN`: Sentry error tracking DSN
          - `SLACK_WEBHOOK`: Slack webhook for notifications

          ## Setup Instructions

          1. Go to your GitHub repository
          2. Settings → Secrets and variables → Actions
          3. Add each secret listed above
          4. Use in workflows with `${{ secrets.SECRET_NAME }}`
          EOF
