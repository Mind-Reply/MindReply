name: MindReply – CI/CD (GHCR + VPS + Vercel)

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

  docker_ghcr:
    name: Docker build & push to GHCR
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/mind-reply/mindreply:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/mind-reply/mindreply:latest

  deploy_vps:
    name: Deploy to VPS (Docker from GHCR)
    runs-on: ubuntu-latest
    needs: docker_ghcr

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/mind-reply/mindreply:latest
            docker stop mindreply || true
            docker rm mindreply || true
            docker run -d --name mindreply -p 3000:3000 ghcr.io/mind-reply/mindreply:latest

  deploy_vercel:
    name: Deploy to Vercel (mindreply)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        run: |
          npm i -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  ping_pro_domain:
    name: Check pro.mind-reply.com
    runs-on: ubuntu-latest
    needs: deploy_vercel

    steps:
      - name: Curl pro.mind-reply.com
        run: |
          curl -I https://pro.mind-reply.com || exit 1
