name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Live route smoke
        env:
          SMOKE_BASE_URL: https://www.mind-reply.com
        run: npm run smoke

      - name: Production evidence
        env:
          PRODUCTION_BASE_URL: https://www.mind-reply.com
          ALLOW_FALLBACK: "1"
        run: |
          npm run evidence:production | tee production-evidence.txt
          {
            echo "## Production Evidence"
            echo
            cat production-evidence.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Production env audit
        continue-on-error: true
        env:
          PRODUCTION_BASE_URL: https://www.mind-reply.com
        run: |
          set -o pipefail
          npm run audit:production 2>&1 | tee production-env-audit.txt

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-evidence
          path: |
            production-evidence.txt
            production-env-audit.txt
          if-no-files-found: ignore
