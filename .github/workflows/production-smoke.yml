name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Live route smoke
        env:
          SMOKE_BASE_URL: https://www.mind-reply.com
        run: npm run smoke

      - name: Production env audit
        continue-on-error: true
        env:
          PRODUCTION_BASE_URL: https://www.mind-reply.com
        run: npm run audit:production
