name: MRagent Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write short production report
        env:
          MRAGENT_REPORT_JSON: mragent-monitor-status.json
        run: node scripts/mragent-monitor-report.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload machine-readable status
        uses: actions/upload-artifact@v4
        with:
          name: mragent-monitor-status
          path: mragent-monitor-status.json
          if-no-files-found: error
