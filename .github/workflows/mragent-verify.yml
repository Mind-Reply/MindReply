name: MRagent Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json

      - name: Verify Vercel build guard
        run: node scripts/vercel-ignore-build.mjs --self-test

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --fund=false --progress=false

      - name: Verify decision layer
        run: npm run decision:verify

      - name: Verify MCP app
        run: npm run mcp:verify

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
