name: MindReply Ops Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "scripts/ops-report.ts"
      - "src/**"
      - "docs/**"
      - "site/**"
      - ".github/workflows/ops-monitor.yml"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Generate ops report
        run: npm run ops:report | tee mindreply-ops-report.md

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mindreply-ops-report
          path: mindreply-ops-report.md
