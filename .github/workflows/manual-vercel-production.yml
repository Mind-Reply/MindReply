name: MindReply Manual Vercel Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type deploy-production to spend one production deployment.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: mindreply-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Verified production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}
      MINDREPLY_REPORT_ENABLED: ${{ vars.MINDREPLY_REPORT_ENABLED || 'true' }}
      MINDREPLY_REPORT_DRY_RUN: ${{ vars.MINDREPLY_REPORT_DRY_RUN || 'false' }}
      MINDREPLY_REPORT_CHANNELS: ${{ vars.MINDREPLY_REPORT_CHANNELS || 'email,slack' }}
      MINDREPLY_REPORT_EMAIL: ${{ secrets.MINDREPLY_REPORT_EMAIL || secrets.OPS_REPORT_EMAIL_TO || vars.MINDREPLY_REPORT_EMAIL || vars.REPORT_TO_EMAIL }}
      MINDREPLY_REPORT_EMAILS: ${{ secrets.MINDREPLY_REPORT_EMAILS || vars.MINDREPLY_REPORT_EMAILS }}
      MINDREPLY_REPORT_FROM: ${{ secrets.MINDREPLY_REPORT_FROM || secrets.OPS_REPORT_EMAIL_FROM || vars.MINDREPLY_REPORT_FROM || vars.RESEND_FROM }}
      MINDREPLY_REPORT_EMAIL_ALLOWLIST: ${{ secrets.MINDREPLY_REPORT_EMAIL_ALLOWLIST || secrets.OPS_REPORT_EMAIL_ALLOWLIST || vars.REPORT_EMAIL_ALLOWLIST }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      MINDREPLY_SLACK_WEBHOOK_URL: ${{ secrets.MINDREPLY_SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      NEXT_PUBLIC_SITE_URL: https://www.mind-reply.com
      MINDREPLY_LIVE_VERIFY_URL: https://www.mind-reply.com
      MINDREPLY_LIVE_REVENUE_JSON: mindreply-live-revenue-surface.json
    steps:
      - name: Confirm intentional production deploy
        run: test "${{ inputs.confirm }}" = "deploy-production"

      - name: Require main branch
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Production deploy is restricted to main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check owner report configuration
        run: npm run report:check

      - name: Generate owner state report
        run: npm run launch:report

      - name: Verify revenue blueprint
        run: npm run audit:blueprint

      - name: Verify app
        run: npm run verify:all

      - name: Vercel deploy preflight
        run: |
          test -n "$VERCEL_TOKEN"
          test "$VERCEL_ORG_ID" = "team_0plIJmQLgZC1wVv9zI2eVf3B"
          test "$VERCEL_PROJECT_ID" = "prj_EuO1lFvbwoFSdDxBlezNyXG8eVV3"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build production artifact
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact to production
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

      - name: Verify live production reachability
        run: |
          curl --fail --show-error --silent https://www.mind-reply.com/ > /tmp/mindreply-home.html
          curl --fail --show-error --silent https://www.mind-reply.com/api/health > /tmp/mindreply-health.json
          curl --fail --show-error --silent https://www.mind-reply.com/api/version > /tmp/mindreply-version.json

      - name: Verify live revenue and privacy surface
        run: npm run verify:live-revenue >> "$GITHUB_STEP_SUMMARY"

      - name: Send owner deployment report
        if: always()
        run: npm run report:send || true

      - name: Upload owner report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mindreply-manual-deploy-reports
          path: |
            reports/outbox/**
            mindreply-live-revenue-surface.json
            mindreply-*.md
            mindreply-*.log
          if-no-files-found: ignore
