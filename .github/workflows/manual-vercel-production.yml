name: Manual Vercel Production Deploy

on:
  workflow_dispatch:
    inputs:
      ref_note:
        description: "Operator note for this deploy"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: manual-vercel-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to Vercel production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required Vercel secrets
        shell: bash
        run: |
          missing=0
          for name in VERCEL_ORG_ID VERCEL_PROJECT_ID VERCEL_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production contract
        run: npm run verify:all

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifact
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact to Vercel production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
