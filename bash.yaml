#!/bin/bash
set -e

# Defaults (auto)
RG="${1:-rg-hosted-runners-prod}"
LOCATION="${2:-eastus}"
VNET="${3:-vnet-hosted-runners-prod}"
SUBNET="${4:-runners-subnet}"
SUBNET_PREFIX="${5:-10.0.2.0/24}"
NSG="${6:-nsg-hosted-runners-prod}"
NAT="${7:-nat-gateway-prod}"
PUB_IP="${8:-nat-pip-prod}"
RT="${9:-rt-hosted-runners-prod}"
MI="${10:-github-hosted-runners-msi}"
TAG_ENV="${11:-production}"
OWNER_TAG="${12:-angelllkr}"

# Use current subscription
SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
echo "Using subscription: $SUBSCRIPTION_ID"

# Create resource group
az group create -n "$RG" -l "$LOCATION" --tags environment="$TAG_ENV" owner="$OWNER_TAG"

# Create public IP for NAT
az network public-ip create -g "$RG" -n "$PUB_IP" --sku Standard --allocation-method Static

# Create NAT gateway
az network nat gateway create -g "$RG" -n "$NAT" --public-ip-addresses "$PUB_IP" --idle-timeout 10 --sku Standard

# Create virtual network and subnet
az network vnet create -g "$RG" -n "$VNET" --address-prefixes 10.0.0.0/16 --location "$LOCATION" \
  --subnet-name "$SUBNET" --subnet-prefixes "$SUBNET_PREFIX"

# Create NSG and rules
az network nsg create -g "$RG" -n "$NSG"
# Allow SSH from jumpbox (example jumpbox IP 10.0.10.10/32)
az network nsg rule create -g "$RG" --nsg-name "$NSG" -n Allow-Jumpbox-SSH --priority 100 \
  --source-address-prefixes 10.0.10.10/32 --source-port-ranges '*' --destination-address-prefixes '*' \
  --destination-port-ranges 22 --access Allow --protocol Tcp --direction Inbound
# Allow outbound HTTPS
az network nsg rule create -g "$RG" --nsg-name "$NSG" -n Allow-Out-HTTPS --priority 200 \
  --direction Outbound --access Allow --protocol Tcp --destination-port-ranges 443 --destination-address-prefixes Internet

# Associate NSG to subnet
az network vnet subnet update -g "$RG" --vnet-name "$VNET" -n "$SUBNET" --network-security-group "$NSG"

# Associate NAT gateway to subnet
az network vnet subnet update -g "$RG" --vnet-name "$VNET" -n "$SUBNET" --nat-gateway "$NAT"

# Create route table and route (default route via internet remains; add custom if needed)
az network route-table create -g "$RG" -n "$RT"
az network vnet subnet update -g "$RG" --vnet-name "$VNET" -n "$SUBNET" --route-table "$RT"

# Create user-assigned managed identity
az identity create -g "$RG" -n "$MI"
MI_PRINCIPAL_ID=$(az identity show -g "$RG" -n "$MI" --query principalId -o tsv)

# Assign Network Contributor role on the resource group to the managed identity
az role assignment create --assignee-object-id "$MI_PRINCIPAL_ID" --assignee-principal-type ServicePrincipal \
  --role "Network Contributor" --scope "/subscriptions/$SUBSCRIPTION_ID/resourceGroups/$RG"

echo "Done. Created resources in resource group: $RG (location: $LOCATION)"
echo "VNet: $VNET | Subnet: $SUBNET ($SUBNET_PREFIX)"
echo "NSG: $NSG | NAT: $NAT | Route table: $RT"
echo "Managed Identity: $1"


git clone https://github.com/Mind-Reply/MindReply.git
cd MindReply move all files to main 
git checkout feature/unified-next15-ecosystem to main
npm install
npm run dev
git push origin main then feature/unified-next15-ecosystem
# Then restructure by agent PR → main
# agent push hourly Vercel auto-deploys
