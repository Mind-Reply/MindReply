version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mindreply
      POSTGRES_USER: mr_user
      POSTGRES_PASSWORD: mr_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  api:
    build: ../api
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    restart: on-failure

  n8n:
    image: n8nio/n8n:latest
    env_file: .env
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    restart: unless-stopped

volumes:
  pgdata:
  n8n_data:
